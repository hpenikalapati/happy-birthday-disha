<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<body>

<div class="card">
    <div class="cloud"></div>

    <img src="images/cinnamoroll.png" class="cinnamoroll" alt="Cute puppy">

    <h1>🎂 Happy Birthday! 🎂</h1>

    <p>
        Wishing you the sweetest birthday filled with happiness,
        fluffy clouds, yummy treats, and lots of smiles!
    </p>

    <button onclick="showMessage()">Open Surprise 💙</button>

    <div id="surprise" class="hidden">
        ✨ May all your dreams come true! ✨
        <br><br>
        Have an amazing day!
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
